<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SENNI — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:          #1c1e26;
    --bg2:         #21232e;
    --surface:     rgba(255,255,255,0.04);
    --surface2:    rgba(255,255,255,0.07);
    --border:      rgba(140,145,220,0.13);
    --border-hi:   rgba(129,140,248,0.45);
    --text:        #dde1f0;
    --text-muted:  rgba(221,225,240,0.45);
    --text-dim:    rgba(221,225,240,0.22);
    --text-bright: #eef0fb;
    --indigo:      #818cf8;
    --indigo-hi:   #a5b4fc;
    --purple:      #a78bfa;
    --green:       #6dd4a8;
    --amber:       #fbbf24;
    --grad-start:  #6366f1;
    --grad-end:    #7c3aed;

    --orb-size: 160px;
    --dot-color: #818cf8;
    --orb-bg: rgba(129,140,248,0.12);
    --orb-border: rgba(129,140,248,0.35);
    --glow-color: rgba(129,140,248,0.4);
    --glow-min: 20px;
    --glow-max: 60px;
    --glow-speed: 3s;
    --ring-color: rgba(129,140,248,0.25);
    --ring-speed: 3.5s;
    --breath-speed: 4s;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
  }

  /* ── Ambient background ── */
  .bg-layer {
    position: absolute; inset: 0;
    z-index: 0;
  }
  .bg-mesh {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 900px 600px at 20% 50%, rgba(99,102,241,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 600px 800px at 80% 30%, rgba(124,58,237,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 400px 400px at 60% 80%, rgba(109,212,168,0.03) 0%, transparent 60%);
    animation: meshShift 12s ease-in-out infinite alternate;
  }
  @keyframes meshShift {
    0%   { opacity: 0.7; transform: scale(1) translate(0,0); }
    100% { opacity: 1;   transform: scale(1.04) translate(-10px, 8px); }
  }
  /* Subtle noise grain overlay */
  .bg-grain {
    position: absolute; inset: 0;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }
  /* Fine grid lines */
  .bg-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(140,145,220,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,145,220,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* ── Layout ── */
  .stage {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 120px;
  }

  /* ── Left: Orb + avatar ── */
  .orb-side {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    opacity: 0;
    transform: translateX(-40px);
    animation: fadeSlideIn 1.2s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }

  .orb-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  /* Dots above orb */
  .orb-dots {
    display: flex; gap: 10px;
    height: 14px; align-items: center;
  }
  .orb-dots span {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--dot-color);
    opacity: 0.15;
  }

  /* Main orb body */
  .orb-body {
    position: relative;
    width: var(--orb-size);
    height: var(--orb-size);
    border-radius: 50%;
    background: var(--orb-bg);
    border: 2px solid var(--orb-border);
    display: flex; align-items: center; justify-content: center;
    overflow: visible;
    animation:
      orbGlow var(--glow-speed) ease-in-out infinite,
      orbBreath var(--breath-speed) ease-in-out infinite;
  }
  .orb-ring {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 1.5px solid var(--ring-color);
    pointer-events: none;
    opacity: 0;
    animation: ringPulse var(--ring-speed) ease-out infinite;
  }
  .orb-ring-2 {
    animation-delay: 1.75s;
  }
  .orb-icon {
    width: calc(var(--orb-size) - 8px);
    height: calc(var(--orb-size) - 8px);
    border-radius: 50%;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  /* ── Right: Text content ── */
  .text-side {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 640px;
    opacity: 0;
    transform: translateX(40px);
    animation: fadeSlideIn 1.2s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.22em;
    color: var(--indigo);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.2s forwards;
  }

  .title {
    font-family: 'Lora', serif;
    font-size: 96px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text-bright);
    /* Gradient shimmer on the S */
    background: linear-gradient(135deg, #eef0fb 0%, #a5b4fc 50%, #eef0fb 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: fadeUp 0.9s ease 1.4s forwards;
  }

  .tagline {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 22px;
    font-weight: 400;
    color: var(--text-muted);
    line-height: 1.5;
    opacity: 0;
    animation: fadeUp 0.8s ease 1.7s forwards;
  }

  .tagline em {
    font-style: normal;
    color: var(--indigo-hi);
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
    border-radius: 1px;
    opacity: 0;
    animation: fadeUp 0.6s ease 2.0s forwards;
  }

  .pills {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.8s ease 2.2s forwards;
  }

  .pill {
    padding: 8px 18px;
    border-radius: 100px;
    border: 1px solid var(--border-hi);
    background: rgba(129,140,248,0.06);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--indigo-hi);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .pill.green {
    border-color: rgba(109,212,168,0.35);
    background: rgba(109,212,168,0.06);
    color: var(--green);
  }

  /* ── Bottom credit ── */
  .credit {
    position: absolute;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0;
    animation: fadeUp 0.6s ease 2.6s forwards;
    white-space: nowrap;
  }

  /* ── Keyframes ── */
  @keyframes orbGlow {
    0%,100% { box-shadow: 0 0 var(--glow-min) var(--glow-color); }
    50%     { box-shadow: 0 0 var(--glow-max) var(--glow-color); }
  }
  @keyframes orbBreath {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.03); }
  }
  @keyframes ringPulse {
    0%   { transform: scale(1);    opacity: 0.6; }
    100% { transform: scale(1.6);  opacity: 0; }
  }
  @keyframes fadeSlideIn {
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Outro mode (press O or add ?outro to URL) ── */
  body.outro .eyebrow   { animation: none; opacity: 1; }
  body.outro .title     { animation: none; opacity: 1; }
  body.outro .tagline   { animation: none; opacity: 1; }
  body.outro .divider   { animation: none; opacity: 1; }
  body.outro .pills     { animation: none; opacity: 1; }
  body.outro .credit    { animation: none; opacity: 1; }
  body.outro .orb-side  { animation: none; opacity: 1; transform: none; }
  body.outro .text-side { animation: none; opacity: 1; transform: none; }

  body.outro .sub-credit {
    opacity: 1 !important;
    animation: none;
  }

  .sub-credit {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
    opacity: 0;
    white-space: nowrap;
  }

  /* ── Replay hint ── */
  .hint {
    position: absolute;
    top: 32px; right: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .hint:hover { color: var(--indigo); }
</style>
</head>
