name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Python sidecar ─────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare python-embed
        run: python scripts/build_prep.py

      - name: Install runtime deps into python-embed
        run: >
          .\python-embed\python.exe -m pip install --no-warn-script-location
          fastapi "uvicorn[standard]" python-multipart ddgs httpx beautifulsoup4 Pillow

      - name: Install PyInstaller into python-embed
        run: .\python-embed\python.exe -m pip install --no-warn-script-location pyinstaller

      - name: Build Python sidecar
        run: .\python-embed\python.exe -m PyInstaller senni-backend.spec

      # ── Tauri build + sign + release ───────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SENNI ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install SENNI."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
